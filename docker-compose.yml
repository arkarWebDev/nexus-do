services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusdo-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://your-domain.com}
      NODE_ENV: production
      PORT: 3001
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexusdo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: nexusdo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    depends_on:
      - frontend
      - backend
    networks:
      - internal

  certbot:
    image: certbot/certbot
    container_name: nexusdo-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: ""
    command: /bin/sh -c "trap exit TERM; while :; do sleep 12h & wait $${!}; done"
    networks:
      - internal

volumes:
  certbot-webroot:
  certbot-certs:

networks:
  internal:
    driver: bridge
